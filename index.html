<div id="messagesList"></div>

<script type="module">
    // Добавляем методы doc, updateDoc, deleteDoc, increment
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, updateDoc, deleteDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAQAwIs7YCU-gb1aeO0xGF78Hnp84auIIg",
        authDomain: "vladidmir-b24a1.firebaseapp.com",
        projectId: "vladidmir-b24a1",
        storageBucket: "vladidmir-b24a1.firebasestorage.app",
        messagingSenderId: "833649325991",
        appId: "1:833649325991:web:da1b66ec85543efc002882"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const colRef = collection(db, "messages");

    // 1. ФУНКЦИЯ ОТПРАВКИ (была ранее)
    window.saveMessage = async function() {
        const name = document.getElementById('userName').value;
        const text = document.getElementById('userText').value;
        if (name && text) {
            await addDoc(colRef, { name, text, likes: 0, timestamp: serverTimestamp() });
            document.getElementById('userName').value = '';
            document.getElementById('userText').value = '';
        }
    };

    // 2. ФУНКЦИЯ ОБНОВЛЕНИЯ (Лайк) - НОВАЯ
    window.addLike = async function(id) {
        const docRef = doc(db, "messages", id);
        await updateDoc(docRef, {
            likes: increment(1) // Атомарно увеличивает счетчик на 1
        });
    };

    // 3. ФУНКЦИЯ УДАЛЕНИЯ - НОВАЯ
    window.deleteMessage = async function(id) {
        if(confirm("Удалить это сообщение?")) {
            await deleteDoc(doc(db, "messages", id));
        }
    };

    // ОТОБРАЖЕНИЕ (с новыми кнопками)
    const q = query(colRef, orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
        const list = document.getElementById('messagesList');
        list.innerHTML = '';
        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const id = docSnap.id;
            list.innerHTML += `
                <div class="post">
                    <div class="name">${data.name}</div>
                    <div class="text">${data.text}</div>
                    <button onclick="addLike('${id}')">👍 ${data.likes || 0}</button>
                    <button onclick="deleteMessage('${id}')" style="background:red; margin-left:10px;">Удалить</button>
                </div>
            `;
        });
    });
</script>

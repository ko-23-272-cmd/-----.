<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiCipher Pro — Твой личный криптограф</title>
    <style>
        :root { --primary: #2ecc71; --secondary: #3498db; --bg: #f8fafc; --text: #2c3e50; --accent: #e67e22; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; padding: 40px 20px; }
        .container { background: #fff; max-width: 900px; width: 100%; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { text-align: center; margin-bottom: 30px; font-weight: 300; }
        .config-box { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; background: #fdfdfd; border: 1px solid #edf2f7; padding: 25px; border-radius: 10px; margin-bottom: 15px; }
        .description-card { background: #fff9f0; border-left: 5px solid var(--accent); padding: 20px; margin-bottom: 30px; border-radius: 4px 10px 10px 4px; }
        .description-card h3 { margin: 0 0 10px 0; font-size: 16px; color: var(--accent); }
        .description-card p { margin: 0; font-size: 14px; line-height: 1.6; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 14px; font-weight: 600; color: #64748b; }
        select, input, textarea { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 16px; outline: none; }
        textarea { width: 100%; height: 120px; box-sizing: border-box; font-family: 'Courier New', monospace; resize: vertical; }
        .actions { display: flex; gap: 15px; margin: 25px 0; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .btn-enc { background: var(--primary); }
        .btn-dec { background: var(--secondary); }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
    </style>
</head>
<body onload="updateInfo()">

<div class="container">
    <h1>Здравствуйте! Что будем шифровать или расшифровывать?</h1>

    <div class="config-box">
        <div class="input-group">
            <label>Какой язык?</label>
            <select id="lang">
                <option value="ru">Русский</option>
                <option value="kk">Қазақша (Казахский)</option>
                <option value="en">English</option>
            </select>
        </div>
        <div class="input-group">
            <label>Тип шифра:</label>
            <select id="cipher" onchange="updateInfo()">
                <option value="caesar">Шифр Цезаря</option>
                <option value="vigenere">Шифр Виженера</option>
                <option value="atbash">Шифр Атбаша</option>
                <option value="gronsfeld">Шифр Гронсфельда</option>
                <option value="bacon">Шифр Бэкона</option>
                <option value="polybius">Квадрат Полибия</option>
                <option value="playfair">Шифр Плейфера</option>
                <option value="morse">Азбука Морзе</option>
            </select>
        </div>
        <div class="input-group">
            <label id="keyLabel">Ключ:</label>
            <input type="text" id="key" placeholder="Введите ключ...">
        </div>
    </div>

    <div class="description-card">
        <h3 id="infoTitle">Описание</h3>
        <p id="infoText">Загрузка...</p>
    </div>

    <div class="input-group">
        <label>Введите слово или предложение:</label>
        <textarea id="input" placeholder="Введите текст..."></textarea>
    </div>

    <div class="actions">
        <button class="btn-enc" onclick="process(true)">Зашифровать</button>
        <button class="btn-dec" onclick="process(false)">Расшифровать</button>
    </div>

    <div class="input-group">
        <label>Результат:</label>
        <textarea id="output" readonly></textarea>
    </div>
</div>

<script>
    const infoData = {
        caesar: { title: "Шифр Цезаря", label: "Ключ (число):", text: "Сдвигает буквы на N позиций. <br><b>Условие:</b> Введите число (например, 8)." },
        vigenere: { title: "Шифр Виженера", label: "Ключ (слово):", text: "Многоалфавитный шифр, использующий слово-ключ. <br><b>Условие:</b> Введите слово на выбранном языке." },
        atbash: { title: "Шифр Атбаша", label: "Ключ (не нужен):", text: "Зеркальный шифр: первая буква алфавита меняется на последнюю. <br><b>Условие:</b> Ключ не нужен." },
        gronsfeld: { title: "Шифр Гронсфельда", label: "Ключ (цифры):", text: "Сдвиг по последовательности цифр. <br><b>Условие:</b> Введите цифры (напр. 123)." },
        bacon: { title: "Шифр Бэкона", label: "Ключ (не нужен):", text: "Заменяет буквы на 5-значные блоки из A и B. <br><b>Условие:</b> Только латиница." },
        polybius: { title: "Квадрат Полибия", label: "Ключ (не нужен):", text: "Заменяет буквы на координаты в сетке алфавита. <br><b>Условие:</b> Ключ не нужен." },
        playfair: { title: "Шифр Плейфера", label: "Ключ (слово):", text: "Шифрует пары букв через матрицу символов. <br><b>Условие:</b> Введите ключевое слово." },
        morse: { title: "Азбука Морзе", label: "Ключ (не нужен):", text: "Кодирует символы точками и тире. <br><b>Условие:</b> При расшифровке разделяйте буквы пробелом." }
    };

    const MORSE = { "а":".-","б":"-...","в":".--","г":"--.","д":"-..","е":".","ё":".","ж":"...-","з":"--..","и":"..","й":".---","к":"-.-","л":".-..","м":"--","н":"-.","о":"---","п":".--.","р":".-.","с":"...","т":"-","у":"..-","ф":"..-.","х":"....","ц":"-.-.","ч":"---.","ш":"----","щ":"--.-","ъ":"--.--","ы":"-.--","ь":"-..-","э":"..-..","ю":"..--","я":".-.-","a":".-","b":"-...","c":"-.-.","d":"-..","e":".","f":"..-.","g":"--.","h":"....","i":"..","j":".---","k":"-.-","l":".-..","m":"--","n":"-.","o":"---","p":".--.","q":"--.-","r":".-.","s":"...","t":"-","u":"..-","v":"...-","w":".--","x":"-..-","y":"-.--","z":"--..","ә":".-.-.","ғ":"--.-.","қ":"-.-..","ң":"--.--.","ө":"---..","ұ":"..-.-","ү":"..-..-","һ":"....-","і":"..-."," ":"/" };

    const ABCS = {
        ru: "абвгдеёжзийклмнопрстуфхцчшщъыьэюя",
        en: "abcdefghijklmnopqrstuvwxyz",
        kk: "аәбвгғдеёжзийкқлмнңоөпрстуұүфхһцчшщъыіьэюя"
    };

    function updateInfo() {
        const d = infoData[document.getElementById('cipher').value];
        document.getElementById('infoTitle').innerText = d.title;
        document.getElementById('infoText').innerHTML = d.text;
        document.getElementById('keyLabel').innerText = d.label;
    }

    function process(enc) {
        const l = document.getElementById('lang').value, c = document.getElementById('cipher').value;
        const t = document.getElementById('input').value, k = document.getElementById('key').value, a = ABCS[l];
        let res = "";

        if (c === 'morse') {
            if(enc) res = t.toLowerCase().split('').map(char => MORSE[char] || char).join(' ');
            else { const r = Object.fromEntries(Object.entries(MORSE).map(([k,v]) => [v,k])); res = t.split(' ').map(cd => r[cd] || cd).join(''); }
        } 
        else if (c === 'caesar') {
            let s = (parseInt(k)||0) % a.length; if(!enc) s = a.length - s;
            res = t.split('').map(ch => { let i = a.indexOf(ch.toLowerCase()); if(i===-1) return ch; let r = a[(i+s)%a.length]; return ch===ch.toUpperCase()?r.toUpperCase():r; }).join('');
        }
        else if (c === 'atbash') {
            let rv = a.split('').reverse().join('');
            res = t.split('').map(ch => { let i = a.indexOf(ch.toLowerCase()); if(i===-1) return ch; return ch===ch.toUpperCase()?rv[i].toUpperCase():rv[i]; }).join('');
        }
        else if (c === 'vigenere') {
            let kw = k.toLowerCase().replace(/[^a-zа-яәғқңөұүһі]/g, ""); if(!kw) return t; let ki=0;
            res = t.split('').map(ch => { let i = a.indexOf(ch.toLowerCase()); if(i===-1) return ch; let sh = a.indexOf(kw[ki++%kw.length]), f = enc?sh:a.length-sh; let r = a[(i+f)%a.length]; return ch===ch.toUpperCase()?r.toUpperCase():r; }).join('');
        }
        else if (c === 'gronsfeld') {
            if(!k) return t; let ki=0;
            res = t.split('').map(ch => { let i = a.indexOf(ch.toLowerCase()); if(i===-1) return ch; let sh = parseInt(k[ki++%k.length])||0, f = enc?sh:a.length-(sh%a.length); let r = a[(i+f)%a.length]; return ch===ch.toUpperCase()?r.toUpperCase():r; }).join('');
        }
        else if (c === 'bacon') {
            const d = {"a":"aaaaa","b":"aaaab","c":"aaaba","d":"aaabb","e":"aabaa","f":"aabab","g":"aabba","h":"aabbb","i":"abaaa","j":"abaab","k":"ababa","l":"ababb","m":"abbaa","n":"abbab","o":"abbba","p":"abbbb","q":"baaaa","r":"baaab","s":"baaba","t":"baabb","u":"babaa","v":"babab","w":"babba","x":"babbb","y":"bbaaa","z":"bbaab"};
            if(enc) res = t.toLowerCase().split('').map(ch => d[ch] || ch).join(' ');
            else { const r = Object.fromEntries(Object.entries(d).map(([k,v]) => [v,k])); res = t.split(' ').map(cd => r[cd] || cd).join(''); }
        }
        else if (c === 'polybius') {
            let sz = Math.ceil(Math.sqrt(a.length));
            if(enc) res = t.toLowerCase().split('').map(ch => { let i = a.indexOf(ch); return i===-1?ch:(Math.floor(i/sz)+1).toString()+(i%sz+1).toString()+" "; }).join('');
            else { res = t.trim().split(/\s+/).map(x => a[(parseInt(x[0])-1)*sz+(parseInt(x[1])-1)] || x).join(''); }
        }
        else if (c === 'playfair') {
            let cl = t.toLowerCase().replace(/[^a-zа-яәғқңөұүһі]/g, "");
            let m = Array.from(new Set((k.toLowerCase() + a).split(''))); let sz = Math.ceil(Math.sqrt(m.length));
            let gp = (ch) => { let idx = m.indexOf(ch); return [Math.floor(idx/sz), idx%sz]; };
            for(let i=0; i<cl.length; i+=2) {
                let a1=cl[i], a2=cl[i+1]||'х'; if(a1===a2) a2='х'; let [r1,c1]=gp(a1), [r2,c2]=gp(a2);
                if(r1===r2) { c1=(c1+(enc?1:sz-1))%sz; c2=(c2+(enc?1:sz-1))%sz; }
                else if(c1===c2) { r1=(r1+(enc?1:sz-1))%sz; r2=(r2+(enc?1:sz-1))%sz; }
                else { [c1, c2] = [c2, c1]; }
                res += m[r1*sz+c1] + m[r2*sz+c2];
            }
        }
        document.getElementById('output').value = res;
    }
</script>
</body>
</html>

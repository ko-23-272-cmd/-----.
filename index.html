<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Монитор статусов — PRO</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; margin-bottom: 20px; text-align: center; }
        .timer { font-size: 32px; font-weight: bold; color: #4285F4; margin: 10px 0; }
        .btn-stop { background: #dc3545; width: 100%; margin-bottom: 15px; padding: 12px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .chat-box { height: 150px; border: 1px solid #eee; border-radius: 10px; overflow-y: auto; text-align: left; padding: 10px; margin: 10px 0; background: #fafafa; }
        .chat-row { display: flex; gap: 5px; }
        input { flex-grow: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
        button { border: none; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; }
        .btn-google { background: #4285F4; width: 100%; padding: 12px; }
        .btn-send { background: #28a745; padding: 0 15px; }
        .btn-status { padding: 10px; background: #ffc107; color: black; }
        .user-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #eee; text-align: left; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="uName">Вход в систему</h2>
        <button id="loginBtn" class="btn-google">🔵 Войти через Google</button>
        
        <div id="ui" style="display:none;">
            <div class="timer">⏱️ <span id="sec">0</span> сек.</div>
            <button class="btn-stop" onclick="location.reload()">⛔ Завершить сессию</button>
            <div class="grid">
                <button class="btn-status" onclick="changeStatus('☕ Перерыв', '#ffc107')">☕ Перерыв</button>
                <button class="btn-status" style="background:#6c757d; color:white;" onclick="logout()">Выход</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>🎥 Монитор группы</h3>
        <div id="gList"></div>
    </div>

    <div class="card">
        <h3>💬 Общий чат</h3>
        <div class="chat-box" id="cBox"></div>
        <div class="chat-row">
            <input type="text" id="mInp" placeholder="Сообщение...">
            <button class="btn-send" onclick="sendM()">➤</button>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const supabase = createClient('https://mqegsznybpcwnzthvrqp.supabase.co', 'sb_publishable_LIC1tZk2AbwL-aWExuotWw_OT52pl5S');
        const REDIRECT = 'https://ko-23-272-cmd.github.io/-----./';

        let MY_ID = null;
        let MY_NAME = "";
        let s = 0;

        document.getElementById('loginBtn').onclick = () => supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: REDIRECT } });

        async function init() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                MY_ID = user.id;
                MY_NAME = user.user_metadata.full_name || user.email;
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('ui').style.display = 'block';
                document.getElementById('uName').innerText = MY_NAME;
                
                setInterval(() => { s++; document.getElementById('sec').innerText = s; }, 1000);
                loadChat();
            }
        }

        window.changeStatus = async (txt, clr) => {
            await supabase.from('profiles').update({ status: txt, color: clr }).eq('id', MY_ID);
            loadGroup();
        };

        window.sendM = async () => {
            const i = document.getElementById('mInp');
            if (!i.value) return;
            await supabase.from('messages').insert([{ user_name: MY_NAME, text: i.value }]);
            i.value = "";
            loadChat();
        };

        async function loadChat() {
            const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: false }).limit(10);
            if (data) document.getElementById('cBox').innerHTML = data.reverse().map(m => `<div><strong>${m.user_name}:</strong> ${m.text}</div>`).join('');
        }

        async function loadGroup() {
            const { data } = await supabase.from('profiles').select('*');
            if (data) document.getElementById('gList').innerHTML = data.map(u => `
                <div class="user-item">
                    <div class="status-dot" style="background:${u.color || '#ccc'}"></div>
                    <span><strong>${u.username}</strong>: ${u.status || 'В сети'}</span>
                </div>`).join('');
        }

        window.logout = () => { supabase.auth.signOut(); location.reload(); };

        init();
        loadGroup();
        setInterval(() => { loadGroup(); loadChat(); }, 5000);
    </script>
</body>
</html>

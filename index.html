<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiCipher Pro — Система защиты данных</title>
    <style>
        :root { --primary: #2ecc71; --secondary: #3498db; --bg: #f8fafc; --text: #2c3e50; --accent: #e67e22; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; padding: 40px 20px; }
        .container { background: #fff; max-width: 900px; width: 100%; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { text-align: center; margin-bottom: 30px; font-weight: 300; }
        .config-box { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; background: #fdfdfd; border: 1px solid #edf2f7; padding: 25px; border-radius: 10px; margin-bottom: 15px; }
        .description-card { background: #fff9f0; border-left: 5px solid var(--accent); padding: 20px; margin-bottom: 30px; border-radius: 4px 10px 10px 4px; }
        .description-card h3 { margin: 0 0 10px 0; font-size: 16px; color: var(--accent); }
        .description-card p { margin: 0; font-size: 14px; line-height: 1.6; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 14px; font-weight: 600; color: #64748b; }
        select, input, textarea { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 16px; outline: none; }
        textarea { width: 100%; height: 120px; box-sizing: border-box; font-family: 'Courier New', monospace; resize: vertical; }
        .actions { display: flex; gap: 15px; margin: 25px 0; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .btn-enc { background: var(--primary); }
        .btn-dec { background: var(--secondary); }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
    </style>
</head>
<body onload="updateInfo()">

<div class="container">
    <h1>MultiCipher Pro — Твой личный криптограф</h1>

    <div class="config-box">
        <div class="input-group">
            <label>Какой язык?</label>
            <select id="lang" onchange="updateInfo()">
                <option value="ru">Русский</option>
                <option value="kk">Қазақша (Казахский)</option>
                <option value="en">English</option>
            </select>
        </div>
        <div class="input-group">
            <label>Тип шифра:</label>
            <select id="cipher" onchange="updateInfo()">
                <option value="caesar">Шифр Цезаря</option>
                <option value="vigenere">Шифр Виженера</option>
                <option value="atbash">Шифр Атбаша</option>
                <option value="gronsfeld">Шифр Гронсфельда</option>
                <option value="bacon">Шифр Бэкона</option>
                <option value="polybius">Квадрат Полибия</option>
                <option value="playfair">Шифр Плейфера</option>
                <option value="morse">Азбука Морзе</option>
            </select>
        </div>
        <div class="input-group">
            <label id="keyLabel">Ключ:</label>
            <input type="text" id="key" placeholder="Введите ключ...">
        </div>
    </div>

    <div class="description-card">
        <h3 id="infoTitle">Описание</h3>
        <p id="infoText">Загрузка...</p>
    </div>

    <div class="input-group">
        <label>Исходный текст:</label>
        <textarea id="input" placeholder="Введите текст..."></textarea>
    </div>

    <div class="actions">
        <button class="btn-enc" onclick="process(true)">Зашифровать</button>
        <button class="btn-dec" onclick="process(false)">Расшифровать</button>
    </div>

    <div class="input-group">
        <label>Результат:</label>
        <textarea id="output" readonly></textarea>
    </div>
</div>

<script>
    const alphabets = {
        ru: "абвгдеёжзийклмнопрстуфхцчшщъыьэюя",
        en: "abcdefghijklmnopqrstuvwxyz",
        kk: "аәбвгғдеёжзийкқлмнңоөпрстуұүфхһцчшщъыіьэюя"
    };

    const info = {
        caesar: { title: "Шифр Цезаря", label: "Сдвиг (число):", text: "Сдвигает буквы на N позиций. <b>Условие:</b> введите число." },
        vigenere: { title: "Шифр Виженера", label: "Ключевое слово:", text: "Сдвиг по ключевому слову. <b>Условие:</b> введите слово на выбранном языке." },
        atbash: { title: "Шифр Атбаша", label: "Ключ (не нужен):", text: "Зеркальный алфавит. <b>Условие:</b> ключ не требуется." },
        gronsfeld: { title: "Шифр Гронсфельда", label: "Числовой ключ:", text: "Сдвиг по последовательности цифр. <b>Условие:</b> введите цифры." },
        bacon: { title: "Шифр Бэкона", label: "Ключ (не нужен):", text: "Кодирует буквы в блоки 'a' и 'b'. <b>Условие:</b> теперь поддерживает русский и казахский (6-битная версия)." },
        polybius: { title: "Квадрат Полибия", label: "Ключ (не нужен):", text: "Координаты букв в сетке. <b>Условие:</b> результат в цифрах." },
        playfair: { title: "Шифр Плейфера", label: "Ключ (слово):", text: "Шифрует пары букв через матрицу. <b>Условие:</b> введите слово." },
        morse: { title: "Азбука Морзе", label: "Ключ (не нужен):", text: "Точки и тире. <b>Условие:</b> разделяйте буквы пробелом при расшифровке." }
    };

    const morseMap = { "а":".-","б":"-...","в":".--","г":"--.","д":"-..","е":".","ё":".","ж":"...-","з":"--..","и":"..","й":".---","к":"-.-","л":".-..","м":"--","н":"-.","о":"---","п":".--.","р":".-.","с":"...","т":"-","у":"..-","ф":"..-.","х":"....","ц":"-.-.","ч":"---.","ш":"----","щ":"--.-","ъ":"--.--","ы":"-.--","ь":"-..-","э":"..-..","ю":"..--","я":".-.-","a":".-","b":"-...","c":"-.-.","d":"-..","e":".","f":"..-.","g":"--.","h":"....","i":"..","j":".---","k":"-.-","l":".-..","m":"--","n":"-.","o":"---","p":".--.","q":"--.-","r":".-.","s":"...","t":"-","u":"..-","v":"...-","w":".--","x":"-..-","y":"-.--","z":"--..","ә":".-.-.","ғ":"--.-.","қ":"-.-..","ң":"--.--.","ө":"---..","ұ":"..-.-","ү":"..-..-","һ":"....-","і":"..-."," ":"/" };

    function updateInfo() {
        const type = document.getElementById('cipher').value;
        document.getElementById('infoTitle').innerText = info[type].title;
        document.getElementById('infoText').innerHTML = info[type].text;
        document.getElementById('keyLabel').innerText = info[type].label;
    }

    function process(isEnc) {
        const lang = document.getElementById('lang').value;
        const type = document.getElementById('cipher').value;
        const txt = document.getElementById('input').value;
        const key = document.getElementById('key').value;
        const abc = alphabets[lang];
        let res = "";

        if (type === 'bacon') {
            const bits = lang === 'en' ? 5 : 6;
            if (isEnc) {
                res = txt.toLowerCase().split('').map(c => {
                    let i = abc.indexOf(c);
                    if (i === -1) return c;
                    return i.toString(2).padStart(bits, '0').replace(/0/g, 'a').replace(/1/g, 'b');
                }).join(' ');
            } else {
                res = txt.trim().split(/\s+/).map(bin => {
                    if (!/^[ab]+$/.test(bin)) return bin;
                    let i = parseInt(bin.replace(/a/g, '0').replace(/b/g, '1'), 2);
                    return abc[i] || "?";
                }).join('');
            }
        } 
        else if (type === 'caesar') {
            let s = parseInt(key) || 0;
            if (!isEnc) s = abc.length - (s % abc.length);
            res = txt.split('').map(c => {
                let i = abc.indexOf(c.toLowerCase());
                if (i === -1) return c;
                let n = abc[(i + s) % abc.length];
                return c === c.toUpperCase() ? n.toUpperCase() : n;
            }).join('');
        }
        else if (type === 'vigenere') {
            let vKey = key.toLowerCase().replace(new RegExp(`[^${abc}]`, 'g'), ""); 
            if (!vKey) return document.getElementById('output').value = txt;
            let vI = 0;
            res = txt.split('').map(c => {
                let i = abc.indexOf(c.toLowerCase());
                if (i === -1) return c;
                let shift = abc.indexOf(vKey[vI++ % vKey.length]);
                if (!isEnc) shift = abc.length - shift;
                let n = abc[(i + shift) % abc.length];
                return c === c.toUpperCase() ? n.toUpperCase() : n;
            }).join('');
        }
        else if (type === 'atbash') {
            let rv = abc.split('').reverse().join('');
            res = txt.split('').map(c => {
                let i = abc.indexOf(c.toLowerCase());
                if (i === -1) return c;
                let n = rv[i];
                return c === c.toUpperCase() ? n.toUpperCase() : n;
            }).join('');
        }
        else if (type === 'gronsfeld') {
            let gKey = key.replace(/\D/g, "");
            if (!gKey) return document.getElementById('output').value = txt;
            let gI = 0;
            res = txt.split('').map(c => {
                let i = abc.indexOf(c.toLowerCase());
                if (i === -1) return c;
                let s = parseInt(gKey[gI++ % gKey.length]);
                if (!isEnc) s = abc.length - (s % abc.length);
                let n = abc[(i + s) % abc.length];
                return c === c.toUpperCase() ? n.toUpperCase() : n;
            }).join('');
        }
      else if (type === 'polybius') {
    let currentAbc = abc;
    let sd;

    // Спец-настройка для классического английского квадрата 5x5
    if (lang === 'en') {
        sd = 5;
        // В классике J заменяется на I, чтобы влезть в 25 ячеек
        currentAbc = "abcdefghiklmnopqrstuvwxyz"; 
    } else {
        // Для RU и KK оставляем динамический расчет (6x6 и 7x7)
        sd = Math.ceil(Math.sqrt(currentAbc.length));
    }
    
    if (isEnc) {
        let inputTxt = txt.toLowerCase();
        if (lang === 'en') inputTxt = inputTxt.replace(/j/g, "i");

        res = inputTxt.split('').map(c => {
            let i = currentAbc.indexOf(c);
            if (i === -1) return c;
            
            let row = Math.floor(i / sd) + 1;
            let col = (i % sd) + 1;
            return row.toString() + col.toString() + " ";
        }).join('').trim();
    } else {
        res = txt.trim().split(/\s+/).map(token => {
            if (token.length === 2 && /^\d+$/.test(token)) {
                let r = parseInt(token[0]) - 1;
                let c = parseInt(token[1]) - 1;
                let index = r * sd + c;
                return currentAbc[index] || "?";
            }
            return token;
        }).join('');
    }
}
        else if (type === 'playfair') {
            // Создаем матрицу на основе алфавита и ключа
            let m = Array.from(new Set((key.toLowerCase() + abc).replace(new RegExp(`[^${abc}]`, 'g'), "")));
            let sd = Math.ceil(Math.sqrt(m.length));
            let gp = (c) => { let idx = m.indexOf(c); return [Math.floor(idx / sd), idx % sd]; };
            
            let cl = txt.toLowerCase().replace(new RegExp(`[^${abc}]`, 'g'), "");
            if (!isEnc) {
                // При расшифровке просто работаем с парами
            } else {
                // При шифровании готовим биграммы
                let temp = "";
                for(let i=0; i<cl.length; i++) {
                    temp += cl[i];
                    if(i + 1 < cl.length && cl[i] === cl[i+1]) temp += (lang === 'en' ? 'x' : 'х');
                }
                if(temp.length % 2 !== 0) temp += (lang === 'en' ? 'x' : 'х');
                cl = temp;
            }

            for (let i = 0; i < cl.length; i += 2) {
                let a = cl[i], b = cl[i + 1];
                let [r1, c1] = gp(a), [r2, c2] = gp(b);
                if (r1 === r2) {
                    c1 = (c1 + (isEnc ? 1 : sd - 1)) % sd;
                    c2 = (c2 + (isEnc ? 1 : sd - 1)) % sd;
                } else if (c1 === c2) {
                    r1 = (r1 + (isEnc ? 1 : sd - 1)) % sd;
                    r2 = (r2 + (isEnc ? 1 : sd - 1)) % sd;
                } else {
                    [c1, c2] = [c2, c1];
                }
                res += m[r1 * sd + c1] + m[r2 * sd + c2];
            }
        }
        else if (type === 'morse') {
            if (isEnc) {
                res = txt.toLowerCase().split('').map(c => morseMap[c] ? morseMap[c] : c).join(' ');
            } else {
                const rM = Object.fromEntries(Object.entries(morseMap).map(([k, v]) => [v, k]));
                res = txt.trim().split(/\s+/).map(c => rM[c] || c).join('');
            }
        }

        document.getElementById('output').value = res;
    }
</script>
</body>
</html>

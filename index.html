<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaaS Control Panel</title>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: #f4f7f6; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0;
        }
        .container { 
            width: 100%; 
            max-width: 500px; 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            box-sizing: border-box;
        }
        h3 { margin-top: 0; color: #333; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            box-sizing: border-box; 
        }
        button#mainBtn { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 6px; 
            width: 100%; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        button#mainBtn:disabled { background: #ccc; cursor: not-allowed; }
        
        #feed { width: 100%; max-width: 500px; margin-top: 20px; }
        .post { 
            background: #fff; 
            border: 1px solid #eaeaea; 
            padding: 15px; 
            margin-top: 15px; 
            border-radius: 8px; 
            position: relative; 
        }
        .like-btn { 
            cursor: pointer; 
            border: none; 
            background: #f8f9fa; 
            padding: 5px 12px; 
            border-radius: 20px; 
            font-size: 14px; 
            transition: 0.2s; 
        }
        .like-btn:hover { background: #e2e6ea; }
        .time { font-size: 11px; color: #999; float: right; }
    </style>
</head>
<body>

    <div class="container">
        <h3>Панель управления данными</h3>
        <input type="text" id="name" placeholder="Имя профиля">
        <input type="email" id="email" placeholder="Рабочий Email">
        <button id="mainBtn">Опубликовать в облако</button>
    </div>

    <div id="feed"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
            serverTimestamp, updateDoc, doc, increment 
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        // КОНФИГУРАЦИЯ
        const firebaseConfig = {
            apiKey: "AIzaSyDgUxR0Txafc_qA-rpdSzKn3326SIfxsHU",
            authDomain: "qazaq-a072e.firebaseapp.com",
            projectId: "qazaq-a072e",
            storageBucket: "qazaq-a072e.appspot.com",
            messagingSenderId: "47025480090",
            appId: "1:47025480090:web:3dd74ff29bc0c149f39a23",
            measurementId: "G-9TE97NWMB9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // МЕТОД: АТОМАРНОЕ ОБНОВЛЕНИЕ (LIKES)
        window.processLike = async (id) => {
            const docRef = doc(db, "requests", id);
            try {
                await updateDoc(docRef, { likes: increment(1) });
            } catch (e) {
                console.error("Ошибка обновления:", e.message);
            }
        };

        // МЕТОД: ЗАПИСЬ С ВАЛИДАЦИЕЙ
        document.getElementById('mainBtn').onclick = async () => {
            const btn = document.getElementById('mainBtn');
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');

            if (!nameInput.value || !emailInput.value) return alert("Заполните все поля");

            btn.disabled = true;
            try {
                await addDoc(collection(db, "requests"), {
                    name: nameInput.value,
                    email: emailInput.value,
                    likes: 0,
                    timestamp: serverTimestamp()
                });
                emailInput.value = "";
                nameInput.value = "";
            } catch (e) {
                alert("Ошибка безопасности: Данные отклонены сервером.");
                console.error(e);
            } finally {
                btn.disabled = false;
            }
        };

        // МЕТОД: REAL-TIME СИНХРОНИЗАЦИЯ
        const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const time = data.timestamp ? data.timestamp.toDate().toLocaleTimeString() : '...';
                
                feed.innerHTML += `
                    <div class="post">
                        <span class="time">${time}</span>
                        <b>${data.name}</b>
                        <p style="margin: 5px 0;">${data.email}</p>
                        <button class="like-btn" onclick="processLike('${doc.id}')">
                            👍 ${data.likes || 0}
                        </button>
                    </div>`;
            });
        });
    </script>
</body>
</html>

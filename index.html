<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiCipher Pro — Система защиты данных</title>
    <style>
        :root {
            --primary: #2ecc71;
            --secondary: #3498db;
            --bg: #f8fafc;
            --text: #2c3e50;
            --accent: #e67e22;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            background: #fff;
            max-width: 900px;
            width: 100%;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h1 { text-align: center; margin-bottom: 30px; font-weight: 300; }

        .config-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            background: #fdfdfd;
            border: 1px solid #edf2f7;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .description-box {
            background: #fff8f0;
            border-left: 4px solid var(--accent);
            padding: 15px;
            margin-bottom: 30px;
            font-size: 14px;
            line-height: 1.5;
            border-radius: 0 8px 8px 0;
        }

        .description-box b { color: var(--accent); }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        
        label { font-size: 14px; font-weight: 600; color: #64748b; }

        select, input, textarea {
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s;
        }

        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        textarea { width: 100%; height: 120px; box-sizing: border-box; font-family: 'Courier New', monospace; }

        .actions { display: flex; gap: 15px; margin: 20px 0; }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn-enc { background: var(--primary); }
        .btn-dec { background: var(--secondary); }

        button:active { transform: scale(0.98); }
        button:hover { opacity: 0.9; }

        .res-box { margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Здравствуйте! Что будем шифровать или расшифровывать?</h1>

    <div class="config-box">
        <div class="input-group">
            <label>Какой язык?</label>
            <select id="lang">
                <option value="ru">Русский</option>
                <option value="kk">Қазақша (Казахский)</option>
                <option value="en">English</option>
            </select>
        </div>
        <div class="input-group">
            <label>Тип шифра:</label>
            <select id="cipher" onchange="updateDescription()">
                <option value="caesar">Шифр Цезаря</option>
                <option value="vigenere">Шифр Виженера</option>
                <option value="atbash">Шифр Атбаша</option>
                <option value="gronsfeld">Шифр Гронсфельда</option>
                <option value="bacon">Шифр Бэкона</option>
                <option value="polybius">Квадрат Полибия</option>
                <option value="playfair">Шифр Плейфера</option>
            </select>
        </div>
        <div class="input-group">
            <label id="keyLabel">Ключ (число):</label>
            <input type="text" id="key" placeholder="Введите ключ...">
        </div>
    </div>

    <div id="desc" class="description-box">
        <b>О шифре:</b> Каждая буква сдвигается на определенное число позиций в алфавите. <br>
        <b>Условие:</b> В поле "Ключ" нужно ввести <u>целое число</u> (смещение).
    </div>

    <div class="input-group">
        <label>Введите слово или предложение:</label>
        <textarea id="input" placeholder="Введите текст..."></textarea>
    </div>

    <div class="actions">
        <button class="btn-enc" onclick="execute(true)">Зашифровать</button>
        <button class="btn-dec" onclick="execute(false)">Расшифровать</button>
    </div>

    <div class="input-group res-box">
        <label>Результат:</label>
        <textarea id="output" readonly></textarea>
    </div>
</div>

<script>
    const descriptions = {
        caesar: {
            text: "<b>О шифре:</b> Каждая буква сдвигается на определенное число позиций в алфавите. <br><b>Условие:</b> В поле 'Ключ' нужно ввести <u>целое число</u>.",
            label: "Ключ (число):"
        },
        vigenere: {
            text: "<b>О шифре:</b> Шифр использует ключевое слово, где каждая буква слова определяет сдвиг. <br><b>Условие:</b> В поле 'Ключ' нужно ввести <u>слово</u> на выбранном языке.",
            label: "Ключ (слово):"
        },
        atbash: {
            text: "<b>О шифре:</b> Буквы алфавита заменяются на зеркальные (первая на последнюю и т.д.). <br><b>Условие:</b> Ключ <u>не требуется</u>.",
            label: "Ключ (не нужен):"
        },
        gronsfeld: {
            text: "<b>О шифре:</b> Похож на Виженера, но сдвиг задается последовательностью цифр. <br><b>Условие:</b> В поле 'Ключ' введите <u>набор цифр</u> (например, 123).",
            label: "Ключ (цифры):"
        },
        bacon: {
            text: "<b>О шифре:</b> Каждая буква заменяется на уникальный 5-значный код из букв 'A' и 'B'. <br><b>Условие:</b> Ключ <u>не требуется</u>. Работает на базе латиницы.",
            label: "Ключ (не нужен):"
        },
        polybius: {
            text: "<b>О шифре:</b> Каждая буква заменяется на координаты (строка/столбец) в квадратной таблице. <br><b>Условие:</b> Ключ <u>не требуется</u>.",
            label: "Ключ (не нужен):"
        },
        playfair: {
            text: "<b>О шифре:</b> Шифрует пары букв (биграммы) с помощью матрицы, построенной по ключу. <br><b>Условие:</b> В поле 'Ключ' нужно ввести <u>слово</u>.",
            label: "Ключ (слово):"
        }
    };

    function updateDescription() {
        const type = document.getElementById('cipher').value;
        document.getElementById('desc').innerHTML = descriptions[type].text;
        document.getElementById('keyLabel').innerText = descriptions[type].label;
    }

    const ALPHABETS = {
        en: "abcdefghijklmnopqrstuvwxyz",
        ru: "абвгдеёжзийклмнопрстуфхцчшщъыьэюя",
        kk: "аәбвгғдеёжзийкқлмнңоөпрстуұүфхһцчшщъыіьэюя"
    };

    function execute(isEnc) {
        const lang = document.getElementById('lang').value;
        const type = document.getElementById('cipher').value;
        const text = document.getElementById('input').value;
        const key = document.getElementById('key').value;
        const abc = ALPHABETS[lang];
        
        let result = "";
        switch(type) {
            case 'caesar': result = caesar(text, parseInt(key) || 0, isEnc, abc); break;
            case 'atbash': result = atbash(text, abc); break;
            case 'vigenere': result = vigenere(text, key, isEnc, abc); break;
            case 'gronsfeld': result = gronsfeld(text, key, isEnc, abc); break;
            case 'bacon': result = bacon(text, isEnc); break;
            case 'polybius': result = polybius(text, isEnc, abc); break;
            case 'playfair': result = playfair(text, key, isEnc, abc); break;
        }
        document.getElementById('output').value = result;
    }

    function caesar(t, k, e, a) {
        if (!e) k = a.length - (k % a.length);
        return t.split('').map(char => {
            const i = a.indexOf(char.toLowerCase());
            if (i === -1) return char;
            const res = a[(i + k) % a.length];
            return char === char.toUpperCase() ? res.toUpperCase() : res;
        }).join('');
    }

    function atbash(t, a) {
        const rev = a.split('').reverse().join('');
        return t.split('').map(char => {
            const i = a.indexOf(char.toLowerCase());
            return i === -1 ? char : (char === char.toUpperCase() ? rev[i].toUpperCase() : rev[i]);
        }).join('');
    }

    function vigenere(t, k, e, a) {
        if (!k) return t;
        k = k.toLowerCase().replace(/[^a-zа-яәғқңөұүһі]/g, "");
        let ki = 0;
        return t.split('').map(char => {
            const i = a.indexOf(char.toLowerCase());
            if (i === -1) return char;
            const kShift = a.indexOf(k[ki % k.length]);
            const shift = e ? kShift : a.length - kShift;
            ki++;
            const res = a[(i + shift) % a.length];
            return char === char.toUpperCase() ? res.toUpperCase() : res;
        }).join('');
    }

    function gronsfeld(t, k, e, a) {
        if (!k) return t;
        let ki = 0;
        return t.split('').map(char => {
            const i = a.indexOf(char.toLowerCase());
            if (i === -1) return char;
            const kShift = parseInt(k[ki % k.length]) || 0;
            const shift = e ? kShift : a.length - (kShift % a.length);
            ki++;
            const res = a[(i + shift) % a.length];
            return char === char.toUpperCase() ? res.toUpperCase() : res;
        }).join('');
    }

    function bacon(t, e) {
        const dict = {"a":"aaaaa","b":"aaaab","c":"aaaba","d":"aaabb","e":"aabaa","f":"aabab","g":"aabba","h":"aabbb","i":"abaaa","j":"abaab","k":"ababa","l":"ababb","m":"abbaa","n":"abbab","o":"abbba","p":"abbbb","q":"baaaa","r":"baaab","s":"baaba","t":"baabb","u":"babaa","v":"babab","w":"babba","x":"babbb","y":"bbaaa","z":"bbaab"};
        if (e) return t.toLowerCase().split('').map(c => dict[c] ? dict[c] : c).join(' ');
        const rev = Object.fromEntries(Object.entries(dict).map(([k,v]) => [v,k]));
        return t.split(' ').map(c => rev[c] || c).join('');
    }

    function polybius(t, e, a) {
        const size = Math.ceil(Math.sqrt(a.length));
        if (e) return t.toLowerCase().split('').map(c => {
            const i = a.indexOf(c);
            return i === -1 ? c : (Math.floor(i/size)+1).toString() + (i%size+1).toString() + " ";
        }).join('');
        const parts = t.trim().split(/\s+/);
        return parts.map(p => {
            if (p.length !== 2) return p;
            const i = (parseInt(p[0])-1)*size + (parseInt(p[1])-1);
            return a[i] || p;
        }).join('');
    }

    function playfair(t, k, e, a) {
        let matrix = Array.from(new Set((k.toLowerCase() + a).replace(/[^a-zа-яәғқңөұүһі]/g, "")));
        const size = Math.ceil(Math.sqrt(a.length));
        const getPos = (c) => { const idx = matrix.indexOf(c); return idx === -1 ? null : [Math.floor(idx/size), idx%size]; };
        let proc = t.toLowerCase().replace(/[^a-zа-яәғқңөұүһі]/g, "");
        let final = "";
        for(let i=0; i<proc.length; i+=2) {
            let a = proc[i], b = proc[i+1] || 'х';
            if(a === b) b = 'х';
            let p1 = getPos(a), p2 = getPos(b);
            if(!p1 || !p2) continue;
            let r1, c1, r2, c2;
            if(p1[0] === p2[0]) { c1 = (p1[1] + (e?1:size-1)) % size; c2 = (p2[1] + (e?1:size-1)) % size; r1 = p1[0]; r2 = p2[0]; }
            else if(p1[1] === p2[1]) { r1 = (p1[0] + (e?1:size-1)) % size; r2 = (p2[0] + (e?1:size-1)) % size; c1 = p1[1]; c2 = p2[1]; }
            else { r1 = p1[0]; c1 = p2[1]; r2 = p2[0]; c2 = p1[1]; }
            final += matrix[r1*size + c1] + matrix[r2*size + c2];
        }
        return final;
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Profiles</title>
    <style>
        /* Добавил базовые стили, чтобы элементы со скринов были видны */
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .user-item { display: flex; align-items: center; background: white; padding: 10px; margin-bottom: 5px; border-radius: 8px; gap: 10px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; }
    </style>
</head>
<body>

    <div id="myInfo">Загрузка...</div>
    <div id="groupList"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const URL = 'https://rncerhgizyjhovbdpqnl.supabase.co';
        const KEY = 'sb_publishable_ThtftS6uBeaKf8FyndIFtg_O0HMJ5yh';
        const supabase = createClient(URL, KEY);

        const MY_ID = '1d8b0a38-3786-4145-9e2a-a68ca3b42ffc';

        window.changeStatus = async (text, color) => {
            const { error } = await supabase
                .from('profiles')
                .update({ status: text, color: color })
                .eq('id', MY_ID);

            if (error) {
                alert("Ошибка! Проверьте RLS политики в Supabase.");
                console.error(error);
            } else {
                fetchGroup();
            }
        };

        async function fetchGroup() {
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .order('username', { ascending: true });

            if (error) return console.error(error);

            const list = document.getElementById('groupList');
            list.innerHTML = data.map(user => `
                <div class="user-item">
                    <div class="status-dot" style="background: ${user.color || '#ccc'}"></div>
                    <div style="flex-grow: 1;">
                        <strong>${user.username}</strong><br>
                        <small style="color: #666;">${user.status || 'Статус не задан'}</small>
                    </div>
                </div>
            `).join('');

            const me = data.find(u => u.id === MY_ID);
            if (me) document.getElementById('myInfo').innerText = `Вы зашли как: ${me.username}`;
        }

        fetchGroup();

        setInterval(fetchGroup, 5000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaaS Firestore Demo</title>
    <style>
        /* Стили оставлены без изменений, они отличные */
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); box-sizing: border-box; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button#mainBtn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button#mainBtn:disabled { background: #ccc; }
        #feed { width: 100%; max-width: 500px; margin-top: 20px; }
        .post { background: #fff; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 8px; position: relative; }
        .like-btn { cursor: pointer; border: none; background: #f8f9fa; padding: 5px 12px; border-radius: 20px; font-size: 14px; }
        .time { font-size: 11px; color: #999; float: right; }
    </style>
</head>
<body>

    <div class="container">
        <h3>Панель управления</h3>
        <input type="text" id="name" placeholder="Имя профиля" maxlength="30">
        <input type="email" id="email" placeholder="Рабочий Email">
        <button id="mainBtn">Опубликовать в облако</button>
    </div>

    <div id="feed"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
            serverTimestamp, updateDoc, doc, increment 
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        // Для GitHub: в идеале ключи должны подтягиваться из окружения, 
        // но для статического сайта это база.
        const firebaseConfig = {
        apiKey: "AIzaSyAQAWIs7YCU-gb1ae00xGF78Hnp84auIIg",
        authDomain: "vladidmir-b24a1.firebaseapp.com",
        projectId: "vladidmir-b24a1",
        storageBucket: "vladidmir-b24a1.firebasestorage.app",
        messagingSenderId: "833649325991",
        appId: "1:833649325991:web:da1b66ec85543efc002882",
        measurementId: "G-JXE3L7JHM2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Функция для безопасного отображения текста (защита от XSS)
        const sanitize = (str) => {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        };

        window.processLike = async (id) => {
            try {
                const docRef = doc(db, "requests", id);
                await updateDoc(docRef, { likes: increment(1) });
            } catch (e) {
                console.error("Update failed:", e);
            }
        };

        const btn = document.getElementById('mainBtn');
        btn.onclick = async () => {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();

            if (name.length < 2 || !email.includes('@')) {
                return alert("Пожалуйста, введите корректные данные");
            }

            btn.disabled = true;
            try {
                await addDoc(collection(db, "requests"), {
                    name,
                    email,
                    likes: 0,
                    timestamp: serverTimestamp()
                });
                document.getElementById('name').value = "";
                document.getElementById('email').value = "";
            } catch (e) {
                alert("Ошибка доступа: проверьте правила Firestore Rules");
            } finally {
                btn.disabled = false;
            }
        };

        const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = ""; // Очищаем ленту
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                const postDate = data.timestamp ? data.timestamp.toDate().toLocaleTimeString() : "сейчас";
                
                // Создаем элемент через шаблонную строку, но прогоняем данные через sanitize
                const postHtml = `
                    <div class="post">
                        <span class="time">${postDate}</span>
                        <b>${sanitize(data.name)}</b>
                        <p style="margin: 5px 0;">${sanitize(data.email)}</p>
                        <button class="like-btn" onclick="processLike('${doc.id}')">
                            👍 ${data.likes || 0}
                        </button>
                    </div>`;
                feed.insertAdjacentHTML('beforeend', postHtml);
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KO-23: Лидеры и Достижения</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; margin: 0; color: #323232; }
    .main-column { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 500px; }
    .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); border: 1px solid #eef0f2; }
    
    /* Профиль */
    .timer-display { font-size: 3em; font-weight: 800; color: #4285F4; text-align: center; margin: 10px 0; }
    .user-info { text-align: center; font-weight: bold; font-size: 1.2em; color: #5f6368; margin-bottom: 10px; }
    
    .grid-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
    .grid-buttons button { padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    
    .btn-study { background: #34a853; }
    .btn-coffee { background: #fbbc05; color: #3c4043 !important; }
    .btn-game { background: #4285F4; }
    .btn-home { background: #70757a; }
    .btn-logout { background: #ea4335; color: white; width: 100%; padding: 10px; border: none; border-radius: 10px; margin-bottom: 15px; cursor: pointer; font-weight: bold; }

    /* Списки */
    .section-header { font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; font-size: 1.2em; color: #202124; }
    .user-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f1f3f4; }
    .status-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 4px rgba(0,0,0,0.2); }
    
    /* Иконки */
    .medal-icon { font-size: 1.3em; margin-right: 4px; }
    .badge-icon { margin-left: 3px; font-size: 1.1em; }

    /* Чат */
    .chat-box { height: 180px; overflow-y: auto; background: #f8f9fa; border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid #e8eaed; font-size: 0.95em; }
    .chat-msg { margin-bottom: 8px; }
    .chat-msg b { color: #4285F4; }
    .input-group { display: flex; gap: 8px; }
    .input-group input { flex-grow: 1; padding: 12px; border: 1px solid #dadce0; border-radius: 12px; outline: none; }
    .btn-send { background: #34a853; color: white; border: none; border-radius: 12px; padding: 0 20px; cursor: pointer; }

    /* ТОП */
    .top-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: #f8f9fa; border-radius: 12px; margin-bottom: 8px; }
    .leader-row { background: #fff8e1; border: 1px solid #ffe082; }
    
    #auth { text-align: center; padding: 30px; }
    .btn-login { background: #4285F4; color: white; padding: 16px; border-radius: 12px; width: 100%; border: none; font-weight: bold; cursor: pointer; font-size: 1.1em; }
  </style>
</head>
<body>

  <div class="main-column">
    <div id="authSection" class="card" style="display: none;">
      <h1>🎓 KO-23</h1>
      <button class="btn-login" onclick="login()">🌐 Войти через Google</button>
    </div>

    <div id="personalStatus" class="card" style="display: none;">
      <button class="btn-logout" onclick="logout()">Выйти</button>
      <div class="user-info" id="myGreeting">Загрузка...</div>
      <div class="timer-display" id="timer">0 сек.</div>
      
      <div class="grid-buttons">
        <button class="btn-study" onclick="changeStatus('Учусь', '#34a853')">📖 Учусь</button>
        <button class="btn-coffee" onclick="changeStatus('Кофе', '#fbbc05')">🍵 Кофе</button>
        <button class="btn-game" onclick="changeStatus('В игре', '#4285F4')">🕹️ В игре</button>
        <button class="btn-home" onclick="changeStatus('Дома', '#70757a')">💤 Дома</button>
      </div>
    </div>

    <div class="card">
      <div class="section-header">👥 Группа сейчас</div>
      <div id="groupList">...</div>
    </div>

    <div class="card">
      <div class="section-header">💬 Чат</div>
      <div id="chatMessages" class="chat-box"></div>
      <div class="input-group">
        <input type="text" id="chatInput" placeholder="Сообщение...">
        <button class="btn-send" onclick="sendMessage()">➤</button>
      </div>
    </div>

    <div class="card">
      <div class="section-header">🏆 Топ студентов</div>
      <div id="topList">...</div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const URL = 'https://mqegsznybpcwnzthvrqp.supabase.co';
    const KEY = 'sb_publishable_LIC1tZk2AbwL-aWExuotWw_OT52pl5S';
    const supabase = createClient(URL, KEY);

    let currentUser = null;
    let secondsCounter = 0;

    window.login = () => supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
    window.logout = async () => { await supabase.auth.signOut(); location.reload(); };

    window.changeStatus = async (txt, clr) => {
      if (!currentUser) return;
      await supabase.from('profiles').upsert({
        id: currentUser.id, username: currentUser.user_metadata.full_name, status: txt, color: clr, last_seen: new Date().toISOString()
      });
      fetchData();
    };

    window.sendMessage = async () => {
      const input = document.getElementById('chatInput');
      if (!input.value.trim() || !currentUser) return;
      await supabase.from('chat_messages').insert({ username: currentUser.user_metadata.full_name, message: input.value });
      input.value = '';
      fetchMessages();
    };

    async function fetchMessages() {
      const { data } = await supabase.from('chat_messages').select('*').order('created_at', { ascending: false }).limit(25);
      if (data) {
        document.getElementById('chatMessages').innerHTML = data.reverse().map(m => 
          `<div class="chat-msg"><b>${m.username}:</b> ${m.message}</div>`).join('');
        document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
      }
    }

    async function fetchData() {
      if (!currentUser) return;

      // 1. Получаем профиль и данные чата
      const { data: p } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
      const { data: allUsers } = await supabase.from('profiles').select('*').order('study_time', { ascending: false });
      const { count: msgCount } = await supabase.from('chat_messages').select('*', { count: 'exact', head: true }).eq('username', currentUser.user_metadata.full_name);

      let newTime = (p?.study_time || 0) + 10;
      let badges = p?.badges || [];
      let updated = false;

      // ПРОВЕРКА ДОСТИЖЕНИЙ
      const hour = new Date().getHours();
      if (hour >= 5 && hour < 8 && !badges.includes('🌅')) { badges.push('🌅'); updated = true; } // Пташка
      if (hour >= 0 && hour < 4 && !badges.includes('🦉')) { badges.push('🦉'); updated = true; } // Сова
      if (msgCount >= 20 && !badges.includes('📢')) { badges.push('📢'); updated = true; } // Активист
      if (secondsCounter >= 7200 && !badges.includes('🏃')) { badges.push('🏃'); updated = true; } // Марафонец
      if (allUsers && allUsers[0]?.id === currentUser.id && !badges.includes('👑')) { badges.push('👑'); updated = true; } // Лидер

      // Обновляем время и значки в базе
      await supabase.from('profiles').update({ 
        study_time: newTime, badges: badges, last_seen: new Date().toISOString() 
      }).eq('id', currentUser.id);
      
      if (allUsers) renderLists(allUsers);
    }

    function renderLists(users) {
      const medals = ['🥇', '🥈', '🥉'];
      
      // Рендер Монитора
      document.getElementById('groupList').innerHTML = users.map((u, i) => {
        const medal = i < 3 ? `<span class="medal-icon">${medals[i]}</span>` : '';
        const b = (u.badges || []).map(icon => `<span class="badge-icon">${icon}</span>`).join('');
        return `
        <div class="user-item">
          <div style="display:flex; align-items:center; gap:8px;">
            <div class="status-dot" style="background:${u.color || '#ccc'}"></div>
            <span>${medal}<b>${u.username}</b> ${b}</span>
          </div>
          <small>${u.status || 'Онлайн'}</small>
        </div>`;
      }).join('');

      // Рендер ТОПа
      document.getElementById('topList').innerHTML = users.slice(0, 5).map((u, i) => `
        <div class="top-row ${i === 0 ? 'leader-row' : ''}">
          <span>${i < 3 ? medals[i] : (i+1)+'.'} <b>${u.username}</b></span>
          <span style="color:#5f6368; font-weight:bold;">${Math.round((u.study_time || 0)/60)} мин</span>
        </div>`).join('');
    }

    async function init() {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        currentUser = session.user;
        document.getElementById('personalStatus').style.display = 'block';
        document.getElementById('myGreeting').innerText = "Вы: " + currentUser.user_metadata.full_name;
        setInterval(() => { secondsCounter++; document.getElementById('timer').innerText = secondsCounter + " сек."; }, 1000);
        setInterval(fetchData, 10000);
        setInterval(fetchMessages, 3000);
        fetchData(); fetchMessages();
      } else {
        document.getElementById('authSection').style.display = 'block';
      }
    }
    init();
  </script>
</body>
</html>

<div id="dataContainer"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    // ВСТАВЬ СВОИ ДАННЫЕ ЗДЕСЬ
    apiKey: "YOUR_API_KEY",
    projectId: "YOUR_PROJECT_ID",
    // ... остальные поля
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const colRef = collection(db, "requests");

  // ФУНКЦИЯ ОТПРАВКИ
  window.sendData = async function() {
    const name = document.getElementById('nameInput').value;
    const email = document.getElementById('emailInput').value;
    
    if(name && email) {
      await addDoc(colRef, {
        name: name,
        email: email,
        time: new Date().toLocaleTimeString('it-IT'),
        likes: 0,
        createdAt: Date.now() // для сортировки
      });
      document.getElementById('nameInput').value = '';
      document.getElementById('emailInput').value = '';
    }
  };

  // ПОЛУЧЕНИЕ ДАННЫХ (Real-time)
  const q = query(colRef, orderBy("createdAt", "desc"));
  onSnapshot(q, (snapshot) => {
    const container = document.getElementById('dataContainer');
    container.innerHTML = '';
    snapshot.forEach((docSnap) => {
      const data = docSnap.data();
      const id = docSnap.id;
      
      container.innerHTML += `
        <div class="list-item">
            <div class="time">${data.time}</div>
            <div class="name">${data.name}</div>
            <div class="email">${data.email}</div>
            <div class="likes" onclick="addLike('${id}')" style="cursor:pointer">
                👍 ${data.likes || 0}
            </div>
        </div>
      `;
    });
  });

  // ФУНКЦИЯ ЛАЙКА
  window.addLike = async function(id) {
    const docRef = doc(db, "requests", id);
    await updateDoc(docRef, {
      likes: increment(1)
    });
  };
</script>

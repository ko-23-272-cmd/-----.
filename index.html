<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KO-23: Статус и Квесты</title>
  <style>
    /* Твой оригинальный дизайн со скриншотов */
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; margin: 0; }
    .page-wrapper { display: flex; gap: 20px; max-width: 1000px; width: 100%; align-items: flex-start; }
    
    /* Левая колонка (как на фото) */
    .main-column { flex: 0 0 400px; display: flex; flex-direction: column; gap: 20px; }
    
    /* Правая колонка (новые шкалы) */
    .quests-column { flex: 1; position: sticky; top: 20px; }

    .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    
    /* Стили из твоего интерфейса */
    .timer-display { font-size: 3.5em; font-weight: bold; color: #4e8cff; text-align: center; margin: 20px 0; }
    .btn-exit { background: #e74c3c; color: white; border: none; padding: 10px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 15px; }
    
    .grid-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid-buttons button { border: none; padding: 15px; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

    /* Чат и Списки */
    .chat-box { height: 250px; overflow-y: auto; background: #f8f9fa; border-radius: 15px; padding: 15px; border: 1px solid #eee; margin-top: 10px; font-size: 0.9em; }
    .user-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dotted #ddd; }

    /* НОВЫЕ СТИЛИ ДЛЯ ШКАЛ СПРАВА */
    .quest-card { margin-bottom: 15px; padding: 15px; background: #fdfdfd; border-radius: 15px; border: 1px solid #efefef; }
    .progress-container { margin-top: 10px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 0.8em; font-weight: bold; color: #777; margin-bottom: 5px; }
    .progress-bar-bg { width: 100%; height: 8px; background: #eee; border-radius: 10px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: #4e8cff; transition: width 0.5s ease; }
  </style>
</head>
<body>

<div class="page-wrapper">
    <div class="main-column">
        <div id="authSection" class="card" style="display:none;">
            <h2 style="text-align:center;">Вход в систему</h2>
            <button onclick="login()" style="width:100%; padding:15px; border-radius:10px; background:#4e8cff; color:white; border:none; font-weight:bold;">Войти через Google</button>
        </div>

        <div id="personalStatus" class="card" style="display:none;">
            <button class="btn-exit" onclick="logout()">Выйти</button>
            <div id="myGreeting" style="text-align:center; font-weight:bold; color:#555;">Вы: Владимир Смирнов</div>
            <div class="timer-display" id="timer">0 сек.</div>
            
            <div class="grid-buttons">
                <button style="background:#44ad62" onclick="changeStatus('Учусь 📖', '#44ad62')">📖 Учусь</button>
                <button style="background:#f9bc15" onclick="changeStatus('Кофе 🍵', '#f9bc15')">🍵 Кофе</button>
                <button style="background:#4e8cff" onclick="changeStatus('В игре 🕹️', '#4e8cff')">🕹️ В игре</button>
                <button style="background:#7f8c8d" onclick="changeStatus('Дома 💤', '#7f8c8d')">💤 Дома</button>
            </div>
        </div>

        <div class="card">
            <div style="font-weight:bold;"><span style="font-size:1.2em;">👥</span> Группа сейчас</div>
            <div id="grouplist" style="margin-top:10px;"></div>
        </div>

        <div class="card">
            <div style="font-weight:bold;"><span style="font-size:1.2em;">🏆</span> Топ студентов</div>
            <div id="topList" style="margin-top:10px;"></div>
        </div>

        <div class="card">
            <div style="font-weight:bold;"><span style="font-size:1.2em;">💬</span> Чат</div>
            <div id="chatMessages" class="chat-box"></div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <input id="chatInput" style="flex:1; padding:10px; border-radius:10px; border:1px solid #ddd;" placeholder="Сообщение...">
                <button onclick="sendMessage()" style="background:#44ad62; border:none; border-radius:10px; width:45px; color:white; font-size:1.2em;">➤</button>
            </div>
        </div>
    </div>

    <div class="quests-column card">
        <h3 style="margin-top:0; color:#4e8cff;">🎯 Квесты и Прогресс</h3>
        <div id="questsDisplay">Загрузка данных...</div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    const URL = 'https://mqegsznybpcwnzthvrqp.supabase.co';
    const KEY = 'sb_publishable_LIC1tZk2AbwL-aWExuotWw_OT52pl5S';
    const supabase = createClient(URL, KEY);

    let user = null;
    let secondsCounter = 0;

    // ВАЖНЫЕ ФУНКЦИИ СО СКРИНШОТОВ
    window.login = () => supabase.auth.signInWithOAuth({ provider: 'google' });
    window.logout = async () => { await supabase.auth.signOut(); location.reload(); };

    window.changeStatus = async (s, c) => {
        await supabase.from('profiles').upsert({ id: user.id, username: user.user_metadata.full_name, status: s, color: c });
        fetchData();
    };

    window.sendMessage = async () => {
        const input = document.getElementById('chatInput');
        if (!input.value.trim()) return;
        
        await supabase.from('chat_messages').insert({ username: user.user_metadata.full_name, message: input.value });
        
        // Обновляем количество сообщений в профиле для шкалы "Оратор"
        const { data } = await supabase.from('profiles').select('message_count').eq('id', user.id).single();
        await supabase.from('profiles').update({ message_count: (data?.message_count || 0) + 1 }).eq('id', user.id);
        
        input.value = '';
        fetchMessages();
    };

    async function fetchData() {
        const { data: users } = await supabase.from('profiles').select('*').order('study_time', { ascending: false });
        if (!users) return;

        // 1. Рендер "Группа сейчас"
        document.getElementById('grouplist').innerHTML = users.map(u => `
            <div class="user-item">
                <span><span style="color:#44ad62; font-size:1.5em;">●</span> <b>${u.username}</b> ${(u.badges || []).join('')}</span>
                <span style="font-size:0.8em; color:#666;">${u.status || 'Нет статуса'}</span>
            </div>
        `).join('');

        // 2. Рендер "Топ студентов" (в минутах)
        document.getElementById('topList').innerHTML = users.slice(0, 5).map((u, i) => `
            <div style="background:${i===0 ? '#fff9e6' : '#f8f9fa'}; padding:12px; border-radius:12px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
                <span>${i===0 ? '🥇' : '🥈'} <b>${u.username}</b></span>
                <span style="font-weight:bold; color:#555;">${Math.round((u.study_time || 0)/60)} мин</span>
            </div>
        `).join('');

        // 3. Рендер правых шкал (Новая функция)
        renderQuestBars(users);
    }

    function renderQuestBars(users) {
        document.getElementById('questsDisplay').innerHTML = users.map(u => {
            const timeProg = Math.min(((u.study_time || 0) / 36000) * 100, 100); // 10 часов цель
            const msgProg = Math.min(((u.message_count || 0) / 100) * 100, 100); // 100 сообщений цель
            return `
                <div class="quest-card">
                    <div style="font-weight:bold; color:#4e8cff; font-size:0.9em; margin-bottom:10px;">${u.username}</div>
                    <div class="progress-container">
                        <div class="progress-label"><span>💎 До Ветерана</span><span>${Math.round(u.study_time/60)} / 600 м</span></div>
                        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${timeProg}%"></div></div>
                    </div>
                    <div class="progress-container" style="margin-top:12px;">
                        <div class="progress-label"><span>📣 До Оратора</span><span>${u.message_count || 0} / 100</span></div>
                        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${msgProg}%; background:#44ad62;"></div></div>
                    </div>
                </div>
            `;
        }).join('');
    }

    async function fetchMessages() {
        const { data } = await supabase.from('chat_messages').select('*').order('created_at', { ascending: false }).limit(20);
        if (data) document.getElementById('chatMessages').innerHTML = data.reverse().map(m => `
            <div style="margin-bottom:8px;">
                <span style="color:#4e8cff; font-weight:bold;">${m.username}:</span> <span>${m.message}</span>
            </div>
        `).join('');
        document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
    }

    async function init() {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            user = session.user;
            document.getElementById('personalStatus').style.display = 'block';
            document.getElementById('myGreeting').innerText = "Вы: " + user.user_metadata.full_name;
            
            // Начисление времени (как в твоем старом коде)
            setInterval(async () => {
                secondsCounter++;
                document.getElementById('timer').innerText = secondsCounter + " сек.";
                if (secondsCounter % 10 === 0) {
                    const { data } = await supabase.from('profiles').select('study_time').eq('id', user.id).single();
                    await supabase.from('profiles').update({ study_time: (data?.study_time || 0) + 10 }).eq('id', user.id);
                }
            }, 1000);

            setInterval(fetchData, 10000);
            setInterval(fetchMessages, 3000);
            fetchData(); fetchMessages();
        } else {
            document.getElementById('authSection').style.display = 'block';
        }
    }
    init();
</script>
</body>
</html>

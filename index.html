<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Firebase Cloud App</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; }
        .post { background: #fff; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 8px; width: 100%; max-width: 500px; }
        .theme-dark { background: #2d3436; color: #dfe6e9; }
        .theme-blue { background: #0984e3; color: white; }
        .attached-img { width: 100%; border-radius: 8px; margin-top: 10px; }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .post-avatar { width: 30px; height: 30px; border-radius: 50%; }
        .btn-row { display: flex; gap: 10px; margin-top: 10px; }
        .btn-sm { width: auto; padding: 5px 15px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="authSection" class="container" style="text-align: center;">
        <button id="loginBtn">Войти через Google</button>
        <div id="userInfo" style="display: none;">
            <div class="post-header" style="justify-content: center;">
                <img id="userPhoto" class="post-avatar">
                <span id="userName" style="font-weight: bold;"></span>
            </div>
            <button id="logoutBtn" style="background: #ff4757; margin-top: 10px;">Выйти</button>
        </div>
    </div>

    <div id="messageForm" class="container" style="display: none;">
        <h3>Создать запись</h3>
        <input type="text" id="content" placeholder="Что у вас нового?">
        <input type="text" id="imgUrl" placeholder="Ссылка на картинку (необязательно)">
        <select id="themeSelect">
            <option value="theme-white">Светлая тема</option>
            <option value="theme-dark">Темная тема</option>
            <option value="theme-blue">Синяя тема</option>
        </select>
        <button id="mainBtn">Опубликовать в облако</button>
    </div>

    <div id="feed"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, updateDoc, deleteDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // ТВОИ ДАННЫЕ ИЗ image_8e9645
    const firebaseConfig = {
        apiKey: "AIzaSyDgUxR0TXafc_qA-rpdSzKn33265IfxsHU",
        authDomain: "qazaq-a072e.firebaseapp.com",
        projectId: "qazaq-a072e",
        storageBucket: "qazaq-a072e.firebasestorage.app",
        messagingSenderId: "47025480090",
        appId: "1:47025480090:web:3dd74ff29bc0c149f39a23"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // АВТОРИЗАЦИЯ
    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        document.getElementById('loginBtn').style.display = user ? 'none' : 'block';
        document.getElementById('userInfo').style.display = user ? 'block' : 'none';
        document.getElementById('messageForm').style.display = user ? 'block' : 'none';
        if (user) {
            document.getElementById('userName').innerText = user.displayName;
            document.getElementById('userPhoto').src = user.photoURL;
        }
    });

    // СОХРАНЕНИЕ
    document.getElementById('mainBtn').onclick = async () => {
        const text = document.getElementById('content').value;
        const img = document.getElementById('imgUrl').value;
        const theme = document.getElementById('themeSelect').value;

        if (!text) return alert("Введите текст");

        await addDoc(collection(db, "messages"), {
            name: auth.currentUser.displayName,
            photo: auth.currentUser.photoURL,
            text: text,
            img: img,
            theme: theme,
            likes: 0,
            timestamp: serverTimestamp()
        });
        document.getElementById('content').value = "";
        document.getElementById('imgUrl').value = "";
    };

    // ФУНКЦИИ УПРАВЛЕНИЯ
    window.processLike = (id) => updateDoc(doc(db, "messages", id), { likes: increment(1) });
    window.deletePost = (id) => confirm("Удалить?") && deleteDoc(doc(db, "messages", id));

    // ЛЕНТА
    onSnapshot(query(collection(db, "messages"), orderBy("timestamp", "desc")), (snap) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';
        snap.forEach(s => {
            const d = s.data();
            feed.innerHTML += `
                <div class="post ${d.theme}">
                    <div class="post-header">
                        <img src="${d.photo}" class="post-avatar">
                        <b>${d.name}</b>
                    </div>
                    <p>${d.text}</p>
                    ${d.img ? `<img src="${d.img}" class="attached-img">` : ''}
                    <div class="btn-row">
                        <button class="btn-sm" onclick="processLike('${s.id}')">👍 ${d.likes}</button>
                        <button class="btn-sm" onclick="deletePost('${s.id}')" style="background:#ff4757">🗑</button>
                    </div>
                </div>`;
        });
    });
</script>
</body>
</html>

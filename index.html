<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Control Panel</title>
    <style>
        /* Базовые стили */
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; margin-bottom: 25px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button.main-btn { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button.main-btn:hover { background: #0056b3; }

        /* Стили постов и ТЕМЫ */
        .post { width: 100%; max-width: 400px; padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.4s; border: 1px solid rgba(0,0,0,0.1); }
        .theme-white { background: #ffffff; color: #333; }
        .theme-dark { background: #2d3436; color: #dfe6e9; border-color: #444; }
        .theme-blue { background: #0984e3; color: white; border-color: #0771c1; }
        .theme-purple { background: #6c5ce7; color: white; border-color: #5849c4; }

        .name { font-weight: bold; font-size: 1.1em; }
        .text { margin: 10px 0; opacity: 0.9; }

        /* Кнопки действий */
        .actions { display: flex; gap: 8px; margin-top: 15px; flex-wrap: wrap; }
        .btn-sm { padding: 8px 14px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; font-size: 13px; background: rgba(255,255,255,0.2); color: inherit; font-weight: 600; }
        .btn-del { border-color: rgba(255, 0, 0, 0.3); color: #ff7675; background: rgba(255, 0, 0, 0.05); }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0; font-size: 22px;">Панель управления</h2>
    <input type="text" id="nameInp" placeholder="Имя профиля">
    <input type="text" id="textInp" placeholder="Рабочий Email / Сообщение">
    <select id="themeSelect">
        <option value="theme-white">Светлая тема</option>
        <option value="theme-dark">Темная тема</option>
        <option value="theme-blue">Синяя тема</option>
        <option value="theme-purple">Фиолетовая тема</option>
    </select>
    <button class="main-btn" onclick="sendData()">Опубликовать в облако</button>
</div>

<div id="messagesList"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, updateDoc, deleteDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Твои актуальные ключи из скриншота
    const firebaseConfig = {
        apiKey: "AIzaSyAQAwIs7YCU-gb1aeO0xGF78Hnp84auIIg",
        authDomain: "vladidmir-b24a1.firebaseapp.com",
        projectId: "vladidmir-b24a1",
        storageBucket: "vladidmir-b24a1.firebasestorage.app",
        messagingSenderId: "833649325991",
        appId: "1:833649325991:web:da1b66ec85543efc002882"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const colRef = collection(db, "messages"); // Работаем с коллекцией messages

    // 1. СОЗДАНИЕ (Create)
    window.sendData = async function() {
        const name = document.getElementById('nameInp').value;
        const text = document.getElementById('textInp').value;
        const theme = document.getElementById('themeSelect').value;
        if (name && text) {
            await addDoc(colRef, { name, text, theme, likes: 0, timestamp: serverTimestamp() });
            document.getElementById('nameInp').value = '';
            document.getElementById('textInp').value = '';
        }
    };

    // 2. ЛАЙК (Update числового поля)
    window.addLike = async function(id) {
        await updateDoc(doc(db, "messages", id), { likes: increment(1) });
    };

    // 3. СМЕНА ТЕМЫ (Визуальное обновление)
    window.changeTheme = async function(id) {
        const themes = ['theme-white', 'theme-dark', 'theme-blue', 'theme-purple'];
        const newTheme = themes[Math.floor(Math.random() * themes.length)];
        await updateDoc(doc(db, "messages", id), { theme: newTheme });
    };

    // 4. УДАЛЕНИЕ (Delete)
    window.deleteMessage = async function(id) {
        if(confirm("Удалить эту запись?")) await deleteDoc(doc(db, "messages", id));
    };

    // 5. ЧТЕНИЕ (Read - Realtime)
    onSnapshot(query(colRef, orderBy("timestamp", "desc")), (snap) => {
        const list = document.getElementById('messagesList');
        list.innerHTML = '';
        snap.forEach((s) => {
            const d = s.data();
            list.innerHTML += `
                <div class="post ${d.theme || 'theme-white'}">
                    <div class="name">${d.name}</div>
                    <div class="text">${d.text}</div>
                    <div class="actions">
                        <button class="btn-sm" onclick="addLike('${s.id}')">👍 ${d.likes || 0}</button>
                        <button class="btn-sm" onclick="changeTheme('${s.id}')">🎨 Тема</button>
                        <button class="btn-sm btn-del" onclick="deleteMessage('${s.id}')">Удалить</button>
                    </div>
                </div>`;
        });
    });
</script>
</body>
</html>

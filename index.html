<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Универсальный Шифратор</title>
    <style>
        /* Стили (CSS) */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 900px;
            width: 100%;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            font-size: 22px;
            margin-bottom: 25px;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: #fcfcfc;
            border: 1px solid #eee;
            border-radius: 10px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #34495e;
        }

        select, input, textarea {
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border 0.3s;
        }

        select:focus, input:focus, textarea:focus {
            border-color: #3498db;
        }

        .io-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        textarea {
            height: 120px;
            resize: vertical;
            font-family: monospace;
        }

        .btn-group {
            display: flex;
            gap: 15px;
        }

        button {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.1s;
        }

        .btn-encrypt { background-color: #2ecc71; }
        .btn-decrypt { background-color: #3498db; }

        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.98); }

        .output-label {
            margin-top: 10px;
            color: #7f8c8d;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Здравствуйте! Что будем шифровать или расшифровывать?</h1>

    <div class="settings-grid">
        <div class="field-group">
            <label>Какой язык?</label>
            <select id="langSel">
                <option value="en">English (Английский)</option>
                <option value="ru">Русский</option>
                <option value="kk">Қазақша (Казахский)</option>
            </select>
        </div>

        <div class="field-group">
            <label>Тип шифра:</label>
            <select id="cipherSel">
                <option value="caesar">Шифр Цезаря</option>
                <option value="vigenere">Шифр Виженера</option>
                <option value="atbash">Шифр Атбаша</option>
                <option value="gronsfeld">Шифр Гронсфельда</option>
                <option value="bacon">Шифр Бэкона</option>
                <option value="polybius">Квадрат Полибия</option>
                <option value="playfair">Шифр Плейфера</option>
            </select>
        </div>

        <div class="field-group" id="keyWrap">
            <label>Ключ (слово или цифра):</label>
            <input type="text" id="keyInp" placeholder="Напр: 3 или SECRET">
        </div>
    </div>

    <div class="io-area">
        <label>Введите слово или предложение:</label>
        <textarea id="textInp" placeholder="Напишите текст здесь..."></textarea>

        <div class="btn-group">
            <button class="btn-encrypt" onclick="run(true)">Зашифровать</button>
            <button class="btn-decrypt" onclick="run(false)">Расшифровать</button>
        </div>

        <label class="output-label">Результат:</label>
        <textarea id="textOut" readonly></textarea>
    </div>
</div>

<script>
    /* Логика (JavaScript) */
    const ALPHABETS = {
        en: "abcdefghijklmnopqrstuvwxyz",
        ru: "абвгдеёжзийклмнопрстуфхцчшщъыьэюя",
        kk: "аәбвгғдеёжзийкқлмнңоөпрстуұүфхһцчшщъыіьэюя"
    };

    function run(mode) {
        const lang = document.getElementById('langSel').value;
        const cipher = document.getElementById('cipherSel').value;
        const text = document.getElementById('textInp').value;
        const key = document.getElementById('keyInp').value;
        const abc = ALPHABETS[lang];
        
        let out = "";

        // Применяем выбранный алгоритм
        switch(cipher) {
            case 'caesar': out = caesar(text, parseInt(key) || 0, mode, abc); break;
            case 'vigenere': out = vigenere(text, key, mode, abc); break;
            case 'atbash': out = atbash(text, abc); break;
            case 'gronsfeld': out = gronsfeld(text, key, mode, abc); break;
            case 'bacon': out = bacon(text, mode); break;
            case 'polybius': out = polybius(text, mode, abc); break;
            case 'playfair': out = playfair(text, key, mode, abc); break;
        }
        document.getElementById('textOut').value = out;
    }

    // Вспомогательная для поиска индекса с учетом регистра
    function getIdx(char, abc) { return abc.indexOf(char.toLowerCase()); }

    function caesar(text, shift, enc, abc) {
        if (!enc) shift = abc.length - (shift % abc.length);
        return text.split('').map(c => {
            let i = getIdx(c, abc);
            if (i === -1) return c;
            let res = abc[(i + shift) % abc.length];
            return c === c.toUpperCase() ? res.toUpperCase() : res;
        }).join('');
    }

    function atbash(text, abc) {
        const rev = abc.split('').reverse().join('');
        return text.split('').map(c => {
            let i = getIdx(c, abc);
            if (i === -1) return c;
            let res = rev[i];
            return c === c.toUpperCase() ? res.toUpperCase() : res;
        }).join('');
    }

    function vigenere(text, key, enc, abc) {
        if (!key) return text;
        key = key.toLowerCase().replace(/[^a-zа-яәғқңөұүһі]/g, "");
        let ki = 0;
        return text.split('').map(c => {
            let i = getIdx(c, abc);
            if (i === -1) return c;
            let kChar = key[ki % key.length];
            let kShift = abc.indexOf(kChar);
            if (kShift === -1) kShift = 0;
            let shift = enc ? kShift : abc.length - kShift;
            let res = abc[(i + shift) % abc.length];
            ki++;
            return c === c.toUpperCase() ? res.toUpperCase() : res;
        }).join('');
    }

    function gronsfeld(text, key, enc, abc) {
        if (!key) return text;
        let ki = 0;
        return text.split('').map(c => {
            let i = getIdx(c, abc);
            if (i === -1) return c;
            let kShift = parseInt(key[ki % key.length]) || 0;
            let shift = enc ? kShift : abc.length - (kShift % abc.length);
            let res = abc[(i + shift) % abc.length];
            ki++;
            return c === c.toUpperCase() ? res.toUpperCase() : res;
        }).join('');
    }

    function bacon(text, enc) {
        const codes = {"a":"aaaaa","b":"aaaab","c":"aaaba","d":"aaabb","e":"aabaa","f":"aabab","g":"aabba","h":"aabbb","i":"abaaa","j":"abaab","k":"ababa","l":"ababb","m":"abbaa","n":"abbab","o":"abbba","p":"abbbb","q":"baaaa","r":"baaab","s":"baaba","t":"baabb","u":"babaa","v":"babab","w":"babba","x":"babbb","y":"bbaaa","z":"bbaab"};
        if (enc) {
            return text.toLowerCase().split('').map(c => codes[c] ? codes[c] + " " : c).join('').trim();
        } else {
            const rev = Object.fromEntries(Object.entries(codes).map(([k,v]) => [v,k]));
            return text.split(" ").map(word => rev[word] || word).join("");
        }
    }

    function polybius(text, enc, abc) {
        const size = Math.ceil(Math.sqrt(abc.length));
        if (enc) {
            return text.toLowerCase().split('').map(c => {
                let i = abc.indexOf(c);
                if (i === -1) return c;
                return (Math.floor(i/size)+1).toString() + (i%size+1).toString() + " ";
            }).join('').trim();
        } else {
            let parts = text.trim().split(" ");
            return parts.map(p => {
                if (p.length !== 2) return p;
                let r = parseInt(p[0])-1, c = parseInt(p[1])-1;
                return abc[r * size + c] || p;
            }).join("");
        }
    }

    function playfair(text, key, enc, abc) {
        return "Шифр Плейфера требует уникальной квадратной матрицы для каждого из 3-х алфавитов. В данной версии реализован вывод: [Playfair Error: Alphabet mismatch]";
    }
</script>

</body>
</html>

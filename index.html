<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор статусов PRO</title>
    <style>
        :root { --primary: #4285F4; --success: #34a853; --warning: #fbbc05; --danger: #ea4335; --gray: #5f6368; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        .card { background: white; padding: 24px; border-radius: 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; margin-bottom: 20px; text-align: center; border: 1px solid #ffffff; }
        
        h2, h3, h4 { margin: 0 0 15px 0; color: #202124; }
        
        /* Таймер */
        .timer-display { font-size: 36px; font-weight: bold; color: var(--primary); margin: 15px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* Кнопки */
        button { border: none; padding: 14px; border-radius: 14px; color: white; cursor: pointer; font-weight: 600; transition: all 0.2s ease; font-size: 15px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
        button:hover { filter: brightness(0.9); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        
        .btn-google { background: var(--primary); }
        .btn-stop { background: var(--danger); margin-bottom: 12px; }
        .btn-status { background: var(--warning); color: #000; }
        .btn-exit { background: var(--gray); }
        .btn-send { background: var(--success); width: 50px; padding: 10px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        /* Списки и чат */
        .chat-box { height: 180px; border: 1px solid #f1f3f4; border-radius: 16px; overflow-y: auto; text-align: left; padding: 15px; margin: 15px 0; background: #fcfcfc; font-size: 14px; }
        .input-group { display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; border: 1px solid #dadce0; border-radius: 12px; outline: none; }
        
        .user-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f1f3f4; text-align: left; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; }
        
        #loginSection { display: block; }
        #appSection { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h3 id="welcomeText">Монитор сессии</h3>
        
        <div id="loginSection">
            <button class="btn-google" id="loginBtn">🔵 Войти через Google</button>
        </div>

        <div id="appSection">
            <div class="timer-display">⏱️ <span id="seconds">0</span> сек.</div>
            <button class="btn-stop" onclick="location.reload()">⛔ Завершить сессию</button>
            <div class="grid">
                <button class="btn-status" onclick="updateStatus('☕ Перерыв', '#fbbc05')">☕ Перерыв</button>
                <button class="btn-exit" onclick="handleLogout()">Выход</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h4>🎥 Монитор группы</h4>
        <div id="userList">Загрузка...</div>
    </div>

    <div class="card">
        <h4>💬 Общий чат</h4>
        <div class="chat-box" id="chatMessages"></div>
        <div class="input-group">
            <input type="text" id="msgInput" placeholder="Введите сообщение...">
            <button class="btn-send" onclick="sendChatMessage()">➤</button>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const SB_URL = 'https://mqegsznybpcwnzthvrqp.supabase.co';
        const SB_KEY = 'sb_publishable_LIC1tZk2AbwL-aWExuotWw_OT52pl5S';
        const supabase = createClient(SB_URL, SB_KEY);

        const REDIRECT_URL = 'https://ko-23-272-cmd.github.io/-----./';

        let currentUser = null;
        let timerCount = 0;

        // Авторизация
        document.getElementById('loginBtn').onclick = () => {
            supabase.auth.signInWithOAuth({ 
                provider: 'google', 
                options: { redirectTo: REDIRECT_URL } 
            });
        };

        async function initApp() {
            const { data: { user } } = await supabase.auth.getUser();
            
            if (user) {
                currentUser = user;
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('appSection').style.display = 'block';
                document.getElementById('welcomeText').innerText = user.user_metadata.full_name || user.email;
                
                // Таймер
                setInterval(() => {
                    timerCount++;
                    document.getElementById('seconds').innerText = timerCount;
                }, 1000);

                refreshData();
                setInterval(refreshData, 5000);
            }
        }

        // Выход
        window.handleLogout = async () => {
            await supabase.auth.signOut();
            localStorage.clear();
            window.location.href = REDIRECT_URL;
        };

        // Статус
        window.updateStatus = async (statusText, color) => {
            if (!currentUser) return;
            const { error } = await supabase
                .from('profiles')
                .update({ status: statusText, color: color })
                .eq('id', currentUser.id);
            
            if (error) console.error("Ошибка обновления:", error);
            refreshData();
        };

        // Чат
        window.sendChatMessage = async () => {
            const inp = document.getElementById('msgInput');
            if (!inp.value || !currentUser) return;

            const name = currentUser.user_metadata.full_name || currentUser.email;
            const { error } = await supabase
                .from('messages')
                .insert([{ user_name: name, text: inp.value }]);

            if (error) console.error("Ошибка чата:", error);
            inp.value = "";
            fetchChat();
        };

        async function fetchChat() {
            const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: false }).limit(20);
            if (data) {
                document.getElementById('chatMessages').innerHTML = data.reverse().map(m => 
                    `<div><strong>${m.user_name}:</strong> ${m.text}</div>`
                ).join('');
                const b = document.getElementById('chatMessages');
                b.scrollTop = b.scrollHeight;
            }
        }

        async function refreshData() {
            // Список группы
            const { data: users } = await supabase.from('profiles').select('*').order('username');
            if (users) {
                document.getElementById('userList').innerHTML = users.map(u => `
                    <div class="user-item">
                        <div class="dot" style="background: ${u.color || '#ccc'}"></div>
                        <div>
                            <strong>${u.username || 'Аноним'}</strong><br>
                            <small style="color: #666;">${u.status || 'В сети'}</small>
                        </div>
                    </div>
                `).join('');
            }
            fetchChat();
        }

        initApp();
        // На случай если сессия не подтянулась сразу (для GitHub Pages)
        setTimeout(initApp, 1000);
    </script>
</body>
</html>
